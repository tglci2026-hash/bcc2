<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>BabyCash</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="user">
      <img src="images/avatar_default.png" class="avatar">
      <div>
        <p class="hello">Bonjour</p>
        <p class="username">Utilisateur</p>
      </div>
    </div>
    <img src="images/icon_notification.png" class="icon">
  </div>

  <!-- SOLDE -->
  <div class="balance-card">
    <div class="balance-content">
      <div class="balance-top">
        <span>Solde total</span>
        <img src="images/icon_eye.png" id="toggleBalance">
      </div>

      <h1 id="balance">0 BCC</h1>
      <p class="cfa">≈ 0 CFA</p>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <div class="action">
      <img src="images/icon_send.png">
      <p>Envoyer</p>
      <small>Bientôt</small>
    </div>

    <div class="action">
      <img src="images/icon_receive.png">
      <p>Recevoir</p>
      <small>Bientôt</small>
    </div>

    <div class="action">
      <img src="images/icon_convert.png">
      <p>Convertir</p>
      <small>Bientôt</small>
    </div>

    <div class="action">
      <img src="images/icon_more.png">
      <p>Plus</p>
      <small>...</small>
    </div>
  </div>

  <!-- TRANSACTIONS -->
  <div class="section">
    <h3>Transactions</h3>
    <p class="empty">Aucune transaction pour le moment</p>
  </div>

  <!-- GAGNER -->
  <div class="section">
    <h3>Gagner</h3>

    <div class="reward">
      <img src="images/coin_reward.png">
      <div>
        <p>Solde récompense</p>
        <strong>0 BCC</strong>
      </div>
    </div>

    <p class="empty">Missions bientôt disponibles</p>
  </div>

  <!-- MENU BAS -->
  <div class="nav">
    <img src="images/nav_home.png">
    <img src="images/nav_gift.png">

    <div class="nav-center">
      <img src="images/nav_bcc.png">
    </div>

    <img src="images/nav_market.png">
    <img src="images/nav_profile.png">
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
